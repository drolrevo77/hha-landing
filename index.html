<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HHA Digital</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            font-family: 'Inter', -apple-system, sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .logo {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 600;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: #fff;
            margin-bottom: 0.3em;
        }

        .logo span {
            color: #555;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #333, transparent);
            margin: 1.5em auto;
        }

        .contact {
            font-size: clamp(0.75rem, 2vw, 0.875rem);
            font-weight: 300;
            letter-spacing: 0.25em;
            text-transform: uppercase;
        }

        .contact a {
            color: #888;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .contact a:hover {
            color: #fff;
        }

        .glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.015) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <h1 class="logo">hha<span>.digital</span></h1>
        <div class="divider"></div>
        <p class="contact"><a href="mailto:apps@hha.digital">apps@hha.digital</a></p>
    </div>
</body>
</html>
